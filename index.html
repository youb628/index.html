<style>
:root {
  --gold: #FFD700;
  --gold-light: #FFF0A0;
  --gold-dark: #B8860B;
  --black: #050505;
  --dark: #0e0e0e;
  --dark2: #1a1a1a;
  --dark3: #242424;
  --text: #e8e8e8;
  --red: #ff4444;
  --green: #44ff88;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--black);
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  overflow-x: hidden;
}

/* Only show cursor on desktop */
@media (pointer: fine) {
  body { cursor: none; }
  .cursor, .cursor-dot { display: block; }
}
@media (pointer: coarse) {
  .cursor, .cursor-dot { display: none; }
}

.cursor {
  width: 20px; height: 20px;
  border: 2px solid var(--gold);
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  transition: transform 0.12s ease;
  transform: translate(-50%, -50%);
}
.cursor-dot {
  width: 5px; height: 5px;
  background: var(--gold);
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
}

/* Particles - fewer on mobile */
#particles { position: fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; opacity:0.7; }

/* ===== HEADER ===== */
header {
  position: fixed; top:0; left:0; right:0;
  z-index: 200;
  padding: 14px 40px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(5,5,5,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,215,0,0.15);
}

.logo {
  font-family: 'Cinzel Decorative', serif;
  font-size: 1.5rem; font-weight: 900;
  letter-spacing: 2px;
  background: linear-gradient(135deg, var(--gold), var(--gold-light), var(--gold-dark));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: logoPulse 3s ease-in-out infinite;
  cursor: pointer;
}
@keyframes logoPulse { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.4)} }

nav { display: flex; gap: 24px; align-items: center; }
nav a {
  color: var(--text); text-decoration: none;
  font-size: 0.9rem; font-weight: 600;
  transition: color 0.3s; position: relative;
}
nav a::after {
  content:''; position:absolute; bottom:-4px; left:0; right:0;
  height:1px; background:var(--gold); transform:scaleX(0); transition:transform 0.3s;
}
nav a:hover { color: var(--gold); }
nav a:hover::after { transform: scaleX(1); }

/* Update badge */
.update-badge {
  background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,215,0,0.05));
  border: 1px solid rgba(255,215,0,0.4);
  border-radius: 50px;
  padding: 4px 12px;
  font-size: 0.72rem;
  color: var(--gold);
  letter-spacing: 1px;
}

/* ===== HERO ===== */
.hero {
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  position: relative;
  padding: 120px 20px 80px;
  background: radial-gradient(ellipse at center, #1a1200 0%, #050505 70%);
  overflow: hidden;
}
.hero::before {
  content:''; position:absolute; inset:0;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(255,215,0,0.015) 60px, rgba(255,215,0,0.015) 61px),
    repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(255,215,0,0.015) 60px, rgba(255,215,0,0.015) 61px);
}

.hero-badge {
  background: rgba(255,215,0,0.1);
  border: 1px solid rgba(255,215,0,0.35);
  border-radius: 50px; padding: 6px 20px;
  font-size: 0.78rem; color: var(--gold);
  letter-spacing: 2px; margin-bottom: 24px;
  animation: fadeDown 0.8s ease both;
}
.hero h1 {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(2.8rem, 9vw, 6.5rem);
  font-weight: 900; line-height: 1.1;
  background: linear-gradient(180deg, #fff 0%, var(--gold) 55%, var(--gold-dark) 100%);

  margin-bottom: 20px;
  animation: fadeDown 0.8s 0.2s ease both;
}
.hero p {
  font-size: clamp(0.95rem, 2.5vw, 1.2rem);
  color: rgba(255,255,255,0.55); max-width: 480px; line-height: 1.9;

}
.hero-btns { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; animation: fadeDown 0.8s 0.6s ease both; }
.hero-btn {
  display: inline-flex; align-items: center; gap: 8px;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  color: #000; padding: 14px 36px; border-radius: 4px;
  font-size: 1rem; font-weight: 700; text-decoration: none;
  border: none; cursor: pointer;
  transition: transform 0.25s, box-shadow 0.25s;
  box-shadow: 0 0 25px rgba(255,215,0,0.3);
  font-family: 'Cairo', sans-serif;
}
.hero-btn:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 8px 35px rgba(255,215,0,0.5); }
.hero-btn-outline {
  background: transparent;
  border: 1px solid rgba(255,215,0,0.4);
  color: var(--gold); padding: 14px 28px; border-radius: 4px;
  font-size: 0.95rem; font-weight: 600; cursor: pointer;
  transition: all 0.3s; font-family: 'Cairo', sans-serif;
  text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
}
.hero-btn-outline:hover { background: rgba(255,215,0,0.1); border-color: var(--gold); }

.scroll-hint {
  position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
  opacity: 0.4; animation: bounce 2s infinite;
  font-size: 0.72rem; color: var(--gold); letter-spacing: 2px;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.scroll-hint::after { content:'▼'; font-size: 1rem; }
@keyframes bounce { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(9px)} }

/* ===== STATS ===== */
.stats-bar {
  display: flex; align-items: center; justify-content: center;
  gap: 50px; padding: 50px 20px;
  background: linear-gradient(to right, transparent, rgba(255,215,0,0.04), transparent);
  border-top: 1px solid rgba(255,215,0,0.08);

}
.stat { text-align: center; }
.stat-num {

}
.stat-label { font-size: 0.78rem; color: rgba(255,255,255,0.4); letter-spacing: 1px; margin-top: 4px; }

/* ===== SECTION ===== */
section { position: relative; z-index: 1; }
.section-header { text-align: center; padding: 70px 20px 36px; }
.section-header h2 {
  font-family: 'Cinzel Decorative', serif;

.section-header p { color: rgba(255,255,255,0.45); font-size: 0.9rem; }

.update-banner {

  border: 1px solid rgba(255,215,0,0.2);

}
.update-banner .update-icon { font-size: 1.3rem; }
.update-banner strong { color: var(--gold); }
.update-banner .update-date { margin-right: auto; color: rgba(255,215,0,0.5); font-size: 0.78rem; letter-spacing: 1px; }

/* ===== GAMES GRID ===== */
.games-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
  padding: 0 40px 80px;
  max-width: 1200px; margin: 0 auto;
}

.game-card {
  background: var(--dark2);
  border: 1px solid rgba(255,215,0,0.1);
  border-radius: 10px; overflow: hidden;
  cursor: pointer;
  transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
  position: relative;
  opacity: 0; transform: translateY(28px);
}
.game-card.visible { opacity: 1; transform: translateY(0); transition: opacity 0.55s ease, transform 0.55s ease, border-color 0.3s, box-shadow 0.3s; }
.game-card:hover { transform: translateY(-8px); border-color: rgba(255,215,0,0.45); box-shadow: 0 14px 40px rgba(255,215,0,0.13); }

.new-badge {
  position: absolute; top: 10px; left: 10px; z-index: 5;
  background: linear-gradient(135deg, #ff6b35, #ff4444);
  color: #fff; font-size: 0.65rem; font-weight: 700;
  padding: 3px 9px; border-radius: 50px; letter-spacing: 1px;
  animation: newPulse 1.5s ease-in-out infinite;
}

.game-canvas-wrap {
  width: 100%; height: 170px;

  position: relative; overflow: hidden;
}
.game-canvas-wrap::after {
  content:''; position:absolute; inset:0;
  background: radial-gradient(circle at center, rgba(255,215,0,0.04) 0%, transparent 70%);
}
.game-tag {
  position: absolute; top: 10px; right: 10px;
  background: rgba(255,215,0,0.12); border: 1px solid rgba(255,215,0,0.3);

}
.game-icon {

.game-info { padding: 16px; }

.play-btn {

  border: none; border-top: 1px solid rgba(255,215,0,0.1);
  color: var(--gold); padding: 13px;
  font-size: 0.88rem; font-weight: 700; cursor: pointer;
  transition: background 0.3s;
  font-family: 'Cairo', sans-serif;
}
.play-btn:hover { background: rgba(255,215,0,0.16); }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.9);
  z-index: 500; display: none;
  align-items: center; justify-content: center;
  backdrop-filter: blur(10px);
  padding: 10px;
}
.modal-overlay.active { display: flex; animation: fadeIn 0.25s ease; }

.modal {
  background: var(--dark2);
  border: 1px solid rgba(255,215,0,0.25);
  border-radius: 14px;

  display: flex; flex-direction: column;
  box-shadow: 0 0 70px rgba(255,215,0,0.08);
}
.modal-header {

}
.modal-title { font-size: 1.05rem; color: var(--gold); font-weight: 700; }
.modal-controls { display: flex; gap: 8px; align-items: center; }

.instr-btn {

}
.instr-btn:hover { background: rgba(255,215,0,0.15); color: var(--gold); }

.modal-close {
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);

}
.modal-close:hover { background: rgba(255,68,68,0.2); border-color: rgba(255,68,68,0.4); color: #ff6b6b; }

.instructions-bar {
  background: rgba(255,215,0,0.05); border-bottom: 1px solid rgba(255,215,0,0.1);

.modal-game { flex: 1; display: flex; align-items: center; justify-content: center; padding: 14px; flex-direction: column; gap: 10px; }

canvas { border-radius: 8px; border: 1px solid rgba(255,215,0,0.15); max-width: 100%; display: block; }

/* Loading spinner */
.loader {
  width: 40px; height: 40px;

  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== ABOUT / CONTACT PAGES ===== */

  max-width: 750px; margin: 0 auto; padding: 60px 30px;
}
.info-cards {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
